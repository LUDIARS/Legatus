# Legatus Mosquitto config.
#
# OwnTracks (iOS/Android) → owntracks/<user>/<device> に publish.
# 本ブローカーは Legatus PC 同居前提.
#
# 接続経路:
#  - phone (tailnet): tailnet IP / magic DNS で 1883 plain MQTT
#  - phone (公衆): tailscale funnel --tls-terminated-tcp で TLS 終端 → 1883 plain
#  - Legatus subscriber: 127.0.0.1:1883 plain (loopback)
#
# Mosquitto 自体は plain 1883 のみ listen. TLS 終端は Tailscale 側で行う.
# bind_address は省略 = 全 interface (Docker 内の 0.0.0.0 → host port mapping).

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
